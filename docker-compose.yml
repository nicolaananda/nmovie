services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: nmovie_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-nuvio_db}
    ports:
      - "5433:5432"
    volumes:
      - nmovie_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d nuvio_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ==========================================
  # Backend (Node.js + Express + Prisma)
  # ==========================================
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: nmovie_backend
    restart: unless-stopped
    ports:
      - "7001:7001"
    environment:
      PORT: 7001
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-nuvio_db}
      JWT_SECRET: ${JWT_SECRET:-change_me_please_use_openssl_rand_base64_32}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ghzm.us,https://www.ghzm.us,http://localhost:7781}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy

  # ==========================================
  # Frontend (Vite React + Nginx)
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SCRAPER_PROXY_URL: ${VITE_SCRAPER_PROXY_URL:-}
        VITE_TMDB_API_KEY: ${VITE_TMDB_API_KEY:-}
    container_name: nmovie_frontend
    restart: unless-stopped
    ports:
      - "7781:7781"
    depends_on:
      - backend

volumes:
  nmovie_postgres_data:
